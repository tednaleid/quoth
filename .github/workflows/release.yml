name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build and zip Chrome extension
        run: bunx wxt zip

      - name: Build and zip Firefox extension
        run: bunx wxt zip -b firefox

      - name: Sign Firefox extension
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        run: bunx web-ext sign --source-dir .output/firefox-mv2 --artifacts-dir .output/signed --channel unlisted

      - name: Ensure annotated tag is available
        run: git fetch origin "refs/tags/${{ github.ref_name }}:refs/tags/${{ github.ref_name }}" --force

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-from-tag \
            .output/*-mv3.zip \
            .output/*-mv2.zip \
            .output/signed/*.xpi
